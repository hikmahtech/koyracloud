# Example .paas/app.yaml for a FastAPI backend that also serves a built Vite/React
# SPA (single container, single origin). Drop this at .paas/app.yaml in your repo.
name: my-app
runtime: python+node
subdomain: my-app.apps.example.com   # optional; defaults to <name>.<apps domain>
port: 8000
build:
  - pip install -r requirements.txt
  - bash -c "cd web && npm ci && npm run build"
predeploy:
  - alembic upgrade head
start: uvicorn app.main:app --host 0.0.0.0 --port 8000
persist:
  - data
healthcheck: /health
env:
  CORS_ORIGINS: https://my-app.apps.example.com
secrets:
  - SECRET_KEY

# --- Optional: background workers, cron, and the shared Redis bus -----------
# All run from the SAME built image as the web process above (same env/secrets).

# redis: true                  # provision a scoped Redis + inject REDIS_URL.
                               # IMPORTANT: you may only use keys + pub/sub
                               # channels prefixed with the app name, e.g.
                               # "my-app:jobs". Other names are rejected by the
                               # ACL (shared instance, isolated per app).

# workers:                     # always-on processes — no HTTP port, no router.
#   - name: events
#     start: python -m app.worker      # e.g. BLPOP my-app:jobs and process
#     replicas: 1              # optional (default 1)
#     # cpu: "0.25"            # optional; falls back to the instance default
#     # memory: 128M

# cron:                        # 5-field schedules, UTC. Run to completion.
#   - name: nightly
#     schedule: "0 2 * * *"
#     command: python -m app.jobs.nightly
