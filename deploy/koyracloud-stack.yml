# koyracloud control-plane swarm stack. Instance values come from the shell env
# (see deploy/koyracloud.env.example → deploy/koyracloud.env, sourced by deploy.sh).
# Nothing instance-specific is hardcoded here.
version: "3.8"

services:
  control-plane:
    image: ${KOYRA_IMAGE:-koyracloud:local}
    # Gates the `start-first` rollout below: swarm only shifts traffic to a new
    # task once /api/health answers, so a self-deploy no longer 502s the API
    # while uvicorn is still booting (running create_all + migrations first).
    # python (not curl) — it's already in the image; no extra dependency.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      DB_URL: sqlite:////data/koyracloud.db
      KOYRA_SECRET_KEY_FILE: /run/secrets/koyra_secret_key
      KOYRA_SESSION_SECRET_FILE: /run/secrets/koyra_session_secret
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET_FILE: /run/secrets/koyra_github_client_secret
      GITHUB_PAT_FILE: /run/secrets/koyra_github_pat
      KOYRA_WEBHOOK_SECRET_FILE: /run/secrets/koyra_webhook_secret
      KOYRA_ALLOWED_LOGINS: ${KOYRA_ALLOWED_LOGINS}
      KOYRA_RUNTIME_IMAGE: ${KOYRA_RUNTIME_IMAGE:-koyracloud-runtime:latest}
      # Internal registry (the `registry` service below) + a LOCAL build dir.
      # Per-app images are built off-NFS and pushed here; swarm pulls them on any
      # node, so apps aren't pinned to the build node.
      KOYRA_REGISTRY: ${KOYRA_REGISTRY:-127.0.0.1:5000}
      KOYRA_BUILD_DIR: ${KOYRA_BUILD_DIR:-/tmp/koyra-build}
      KOYRA_NFS_BASE: ${KOYRA_NFS_BASE:-/mnt/koyracloud}
      # NFS server for app persist volumes (Docker mounts the NFS per-node, so
      # apps with data aren't pinned). Empty → plain bind mounts.
      KOYRA_NFS_SERVER: ${KOYRA_NFS_SERVER:-}
      KOYRA_APPS_DOMAIN: ${KOYRA_APPS_DOMAIN:-apps.example.com}
      # Set when apps_domain is fronted by a proxy that terminates TLS (e.g.
      # Cloudflare with a proxied *.<apps_domain> record over a tunnel): Traefik
      # then skips Let's Encrypt for auto-subdomains (the edge serves the cert).
      KOYRA_APPS_DOMAIN_PROXIED: ${KOYRA_APPS_DOMAIN_PROXIED:-}
      KOYRA_BASE_URL: ${KOYRA_BASE_URL}
      KOYRA_PUBLIC_IP: ${KOYRA_PUBLIC_IP:-}
      KOYRA_WEB_DIST: /app/web/dist
      KOYRA_APP_NODE: ${KOYRA_APP_NODE:-}
      KOYRA_RESOLVE_IMAGE_NEVER: ${KOYRA_RESOLVE_IMAGE_NEVER:-}
      # Email alerts (Resend) — key from a Docker secret.
      RESEND_API_KEY_FILE: /run/secrets/koyra_resend_api_key
      KOYRA_EMAIL_FROM: ${KOYRA_EMAIL_FROM:-koyracloud <alerts@example.com>}
      KOYRA_DEFAULT_NOTIFY_EMAIL: ${KOYRA_DEFAULT_NOTIFY_EMAIL:-}
      # Cloudflare for SaaS — custom hostnames for user domains. Token from a
      # Docker secret; inert (no-op) until both token and zone id are set.
      CLOUDFLARE_API_TOKEN_FILE: /run/secrets/koyra_cloudflare_api_token
      KOYRA_CLOUDFLARE_ZONE_ID: ${KOYRA_CLOUDFLARE_ZONE_ID:-}
      KOYRA_CLOUDFLARE_SAAS_ORIGIN: ${KOYRA_CLOUDFLARE_SAAS_ORIGIN:-}
      # Shared Redis bus (the `redis` service below). Apps with `redis: true`
      # get a scoped ACL user (managed via the admin password) + injected
      # REDIS_URL. Empty admin password disables the feature (a manifest asking
      # for redis then fails its deploy loudly).
      # Use the fully-qualified swarm service name, NOT the bare `redis` alias:
      # the control plane also joins the `monitoring` overlay, where the homelab
      # standalone redis is aliased `redis` too — so the bare name resolves to
      # the wrong instance (auth failure). `koyracloud_redis` is unambiguous.
      KOYRA_REDIS_HOST: ${KOYRA_REDIS_HOST:-koyracloud_redis}
      KOYRA_REDIS_PORT: ${KOYRA_REDIS_PORT:-6379}
      KOYRA_REDIS_ADMIN_PASSWORD_FILE: /run/secrets/koyra_redis_admin_password
      KOYRA_REDIS_MAXMEMORY: ${KOYRA_REDIS_MAXMEMORY:-256mb}
      # Cron scheduler (launches due jobs as Swarm run-to-completion jobs).
      KOYRA_CRON_ENABLED: ${KOYRA_CRON_ENABLED:-}
      # SQLite backups. KOYRA_BACKUP_DIR should be a mount separate from the DB
      # volume — with KOYRA_DB_DIR on local disk, point it at the NFS (the whole
      # NFS base is mounted below, so <KOYRA_NFS_BASE>/cp/backups works as-is).
      # Blank => <db-dir>/backups.
      KOYRA_BACKUP_ENABLED: ${KOYRA_BACKUP_ENABLED:-}
      KOYRA_BACKUP_INTERVAL_HOURS: ${KOYRA_BACKUP_INTERVAL_HOURS:-}
      KOYRA_BACKUP_KEEP: ${KOYRA_BACKUP_KEEP:-}
      KOYRA_BACKUP_DIR: ${KOYRA_BACKUP_DIR:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # DB directory. Set KOYRA_DB_DIR to a LOCAL path on KOYRA_CONTROL_NODE
      # (e.g. /var/lib/koyracloud, created beforehand): SQLite runs in WAL mode,
      # which is unsupported on network filesystems (the -shm file needs real
      # shared-memory mmap semantics) — on NFS, concurrent writers hit
      # intermittent "database is locked" (#67). deploy.sh defaults unset
      # KOYRA_DB_DIR to the legacy <KOYRA_NFS_BASE>/cp so existing installs
      # don't lose their DB on upgrade; migrate with docs/DISASTER-RECOVERY.md
      # § "Moving the DB off NFS".
      - ${KOYRA_DB_DIR:-/mnt/koyracloud/cp}:/data
      # builder writes app checkouts here; app containers mount the same tree
      - ${KOYRA_NFS_BASE:-/mnt/koyracloud}:${KOYRA_NFS_BASE:-/mnt/koyracloud}
    networks:
      - traefik_public
      # Joined so the homelab Prometheus (on this external overlay) can scrape
      # GET /metrics at tasks.koyracloud_control-plane:8000. See docs/MONITORING.md.
      - monitoring
    secrets:
      - koyra_secret_key
      - koyra_session_secret
      - koyra_github_client_secret
      - koyra_github_pat
      - koyra_webhook_secret
      - koyra_resend_api_key
      - koyra_cloudflare_api_token
      - koyra_redis_admin_password
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          # Pin to the node holding the control-plane image when not using a
          # registry. Set KOYRA_CONTROL_NODE to a manager hostname.
          - node.hostname == ${KOYRA_CONTROL_NODE}
      labels:
        - traefik.enable=true
        # `&& !PathPrefix(/metrics)` keeps GET /metrics OFF the public edge — it
        # exposes per-app traffic/visitor counts and must not be world-readable.
        # Prometheus scrapes it in-cluster over the `monitoring` overlay
        # (tasks.koyracloud_control-plane:8000), which bypasses Traefik, so this
        # only blocks public access. See docs/MONITORING.md.
        - "traefik.http.routers.koyracloud.rule=Host(`${KOYRA_HOST}`) && !PathPrefix(`/metrics`)"
        - traefik.http.routers.koyracloud.entrypoints=${KOYRA_HTTPS_ENTRYPOINT:-websecure}
        - traefik.http.routers.koyracloud.tls.certresolver=${KOYRA_CERT_RESOLVER:-letsencrypt}
        - traefik.http.services.koyracloud.loadbalancer.server.port=8000
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # Internal Docker registry koyracloud owns. Per-app images are pushed here and
  # pulled by swarm on whichever node runs the app. Published on the ingress
  # mesh, so every node reaches it as 127.0.0.1:5000 (treated as insecure-OK by
  # default) — it is never exposed outside the swarm. One instance, UNPINNED;
  # storage is an NFS-driver volume (Docker mounts the NFS on whatever node it
  # lands on), so a reschedule keeps the images and nothing is pinned.
  registry:
    image: registry:2
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - koyra_registry:/var/lib/registry
    networks:
      - traefik_public
    ports:
      - "5000:5000"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # Shared Redis bus koyracloud owns. Apps with `redis: true` reach it as
  # `redis:6379` on the traefik network (the explicit alias guarantees the name
  # resolves across stacks); each gets a scoped ACL user. `noeviction` means a
  # full instance back-pressures with write errors rather than silently dropping
  # another app's queued messages. AOF on an NFS-driver volume survives a
  # reschedule (unpinned, like the registry). The admin password (the `default`
  # user) is read from a Docker secret at start; `$$` keeps stack-deploy from
  # interpolating the runtime `$(cat ...)`.
  redis:
    image: redis:7-alpine
    command:
      - sh
      - -c
      - 'exec redis-server --requirepass "$$(cat /run/secrets/koyra_redis_admin_password)"
         --maxmemory ${KOYRA_REDIS_MAXMEMORY:-256mb} --maxmemory-policy noeviction
         --appendonly yes'
    volumes:
      # nocopy: skip the image's /data copy-up. On an NFS-driver volume with
      # root_squash, the copy-up's chown to the image's owner is denied
      # ("operation not permitted"), which rejects the task. redis runs as root
      # here (the command override bypasses the entrypoint's gosu drop), so it
      # writes the AOF through the squash to the nobody-owned export fine.
      - type: volume
        source: koyra_redis
        target: /data
        volume:
          nocopy: true
    networks:
      traefik_public:
        aliases:
          - redis
    secrets:
      - koyra_redis_admin_password
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

# The Traefik edge network. Convention name; change here if your swarm differs.
networks:
  traefik_public:
    external: true
  # The homelab monitoring stack's overlay (created by that stack); the control
  # plane joins it so Prometheus can scrape /metrics.
  monitoring:
    external: true

# Registry storage: a Docker NFS-driver volume. Docker mounts the export on the
# node the registry runs on, so the registry service needs no pre-mounted NFS
# and no node pin. The koyracloud/registry dir must exist on the NFS export.
volumes:
  koyra_registry:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${KOYRA_NFS_SERVER},rw,nfsvers=4"
      device: ":${KOYRA_NFS_BASE:-/mnt/koyracloud}/registry"
  # Redis AOF storage. The koyracloud/redis dir must exist on the NFS export.
  koyra_redis:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${KOYRA_NFS_SERVER},rw,nfsvers=4"
      device: ":${KOYRA_NFS_BASE:-/mnt/koyracloud}/redis"

secrets:
  koyra_secret_key:
    external: true
  koyra_session_secret:
    external: true
  koyra_github_client_secret:
    external: true
  koyra_github_pat:
    external: true
  koyra_webhook_secret:
    external: true
  koyra_resend_api_key:
    external: true
  koyra_cloudflare_api_token:
    external: true
  koyra_redis_admin_password:
    external: true
