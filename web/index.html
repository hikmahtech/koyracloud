        },
        {
          "@type": "Question",
          "name": "Is koyracloud free and open source?",

          "acceptedAnswer": { "@type": "Answer", "text": "Yes. In .paas/app.yaml you can declare always-on workers, scheduled cron jobs (5-field UTC), and a shared Redis bus (redis: true) that injects a per-app-isolated REDIS_URL — so a web app can push events to a background worker, all from the same repo and image." }
        },
