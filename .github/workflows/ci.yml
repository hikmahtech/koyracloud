name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE: arshadansari27/koyracloud

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Control-plane tests
        working-directory: control-plane
        run: uv run --with-editable . --with pytest pytest -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build UI
        working-directory: web
        run: npm ci && npm run build

  build:
    name: Build & Push
    needs: [backend, web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: arshadansari27
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Swarm
    needs: [build]
    runs-on: [self-hosted, swarm, linux, x64]
    steps:
      - name: Update koyracloud_control-plane service
        env:
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          SWARM_MANAGER_HOST: ${{ secrets.SWARM_MANAGER_HOST }}
          SWARM_MANAGER_USER: ${{ secrets.SWARM_MANAGER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SWARM_SSH_PRIVATE_KEY }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/swarm_key
          chmod 600 ~/.ssh/swarm_key
          ssh-keyscan -H "$SWARM_MANAGER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/swarm_key -o StrictHostKeyChecking=no \
            "${SWARM_MANAGER_USER}@${SWARM_MANAGER_HOST}" \
            "echo '${DOCKER_HUB_TOKEN}' | docker login -u arshadansari27 --password-stdin && \
             docker pull arshadansari27/koyracloud:${SHORT_SHA} && \
             docker service update --with-registry-auth \
               --image arshadansari27/koyracloud:${SHORT_SHA} \
               --force koyracloud_control-plane"

          rm -f ~/.ssh/swarm_key
